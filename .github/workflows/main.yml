name: Website Quality Guard

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-code:
    name: Verify Code & Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. HTML Structural Validation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run HTMLHint Linter
        run: |
          npx --yes htmlhint "**/*.html" --config .htmlhintrc

      # 2. Broken Link Checker
      - name: Check for Broken Links
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          # Checks all HTML files. Excludes Jinja placeholders (encoded as %7B) and static images from offline scanning.
          args: --offline --exclude '%7B' --exclude 'images/' './**/*.html'
          fail: true
