name: Coding & AI Club CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8

    - name: Check Python Syntax & Compilation
      run: |
        # Verify that all Python files compile cleanly and have no critical syntax faults
        python -m py_compile app.py data.py

    - name: Test Flask Import Integrity
      run: |
        # Ensure Flask application imports without raising routing or naming conflicts
        python -c "from app import app; print('Flask application imported cleanly')"

    - name: Check Code Styling (Flake8)
      run: |
        # Stop the build if there are critical Python syntax issues (E9, F63, F7, F82)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,venv

    - name: Validate Templates Folder Structures
      run: |
        # Basic check to verify template folders are present and populated
        ls -F templates/
