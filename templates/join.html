{% extends "base.html" %}
{% block title %}Join Us – Coding &amp; AI Club{% endblock %}
{% block content %}
    <section class="section">
        <h2>{{ join_data.title }}</h2>
        <p>{{ join_data.desc }}</p>
        <form class="contact-form" id="joinForm" onsubmit="sendEmail(event)">
            <label for="userName">Full Name</label>
            <input type="text" id="userName" placeholder="Enter your full name" required>
            <label for="userTopic">Application Purpose</label>
            <select id="userTopic" required>
                {% for opt in join_data.options %}
                <option value="{{ opt }}">{{ opt }}</option>
                {% endfor %}
            </select>
            <label for="userMessage">Cover Letter / Project Details</label>
            <textarea id="userMessage" placeholder="Please outline your skills, motivation, or project details..." required></textarea>
            <button type="submit">Generate Application Email</button>
        </form>
        <script>
            // Persist form data in localStorage so refresh does not lose it
            const form = document.getElementById('joinForm');
            const fields = ['userName', 'userTopic', 'userMessage'];
            // Load saved data immediately on execution (no need to wait for full page load)
            fields.forEach(id => {
                try {
                    const saved = localStorage.getItem('join_' + id);
                    if (saved !== null) {
                        const el = document.getElementById(id);
                        if (el) el.value = saved;
                    }
                } catch(e) {}
            });

            // Override with query parameters if present
            const urlParams = new URLSearchParams(window.location.search);
            const topic = urlParams.get('topic');
            const message = urlParams.get('message');
            if (topic) {
                const el = document.getElementById('userTopic');
                if (el) {
                    let optionExists = false;
                    for (let i = 0; i < el.options.length; i++) {
                        if (el.options[i].value === topic) {
                            optionExists = true;
                            break;
                        }
                    }
                    if (!optionExists) {
                        const newOpt = document.createElement('option');
                        newOpt.value = topic;
                        newOpt.text = topic;
                        el.add(newOpt);
                    }
                    el.value = topic;
                }
            }
            if (message) {
                const el = document.getElementById('userMessage');
                if (el) el.value = message;
            }
            
            // Clean up query parameters from the browser address bar so refreshing doesn't overwrite input
            if (topic || message) {
                setTimeout(() => {
                    try {
                        window.history.replaceState(window.history.state, document.title, window.location.pathname);
                    } catch (e) {}
                }, 200);
            }
            // Save data on each input change
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', () => {
                        try {
                            localStorage.setItem('join_' + id, el.value);
                        } catch(e) {}
                    });
                }
            });
            // On submit, generate mailto link and then clear storage
            function sendEmail(e) {
                e.preventDefault();
                const name = document.getElementById('userName').value;
                const topic = document.getElementById('userTopic').value;
                const message = document.getElementById('userMessage').value;
                const body = `Name: ${name}%0D%0ATopic: ${topic}%0D%0A%0D%0A${encodeURIComponent(message)}`;
                // Clear saved data after preparing email
                fields.forEach(id => {
                    try {
                        localStorage.removeItem('join_' + id);
                    } catch(e) {}
                });
                window.location.href = `mailto:{{ global_data.social.email }}?subject=${encodeURIComponent(topic)}&body=${body}`;
            }
        </script>
    </section>
{% endblock %}
