{% extends "base.html" %}
{% block title %}Event Registration – Coding &amp; AI Club{% endblock %}
{% block content %}
    <section class="section">
        <h2>Event Registration Portal</h2>
        <p>Please provide your academic and contact details to register for upcoming club events, hackathons, and workshops.</p>
        
        <form class="contact-form" id="registerForm" method="POST" action="/register">
            <label for="candName">Full Name</label>
            <input type="text" id="candName" name="name" placeholder="Enter your full name" required>

            <label for="candRoll">Roll Number / Student ID</label>
            <input type="text" id="candRoll" name="roll" placeholder="e.g. CSE/23/01" required>

            <label for="candEmail">Email Address</label>
            <input type="email" id="candEmail" name="email" placeholder="e.g. student@nitmz.ac.in" required>

            <label for="candPhone">WhatsApp Number</label>
            <input type="tel" id="candPhone" name="phone" placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}" required>

            <label for="candBranch">Department / Branch</label>
            <select id="candBranch" name="branch" required>
                <option value="" disabled selected>Select Department</option>
                <option value="Computer Science &amp; Engineering">Computer Science &amp; Engineering</option>
                <option value="Electronics &amp; Communication Engineering">Electronics &amp; Communication Engineering</option>
                <option value="Electrical Engineering">Electrical &amp; Electronics Engineering</option>
                <option value="Mechanical Engineering">Mechanical Engineering</option>
                <option value="Civil Engineering">Civil Engineering</option>
                <option value="Other">Other / Open Elective</option>
            </select>

            <label for="candDegree">Degree Programme</label>
            <select id="candDegree" name="degree" required>
                <option value="" disabled selected>Select Degree</option>
                <option value="B.Tech">B.Tech</option>
                <option value="M.Tech">M.Tech</option>
                <option value="Ph.D">Ph.D</option>
                <option value="Other">Other</option>
            </select>

            <label for="candYear">Academic Year</label>
            <select id="candYear" name="year" required>
                <option value="" disabled selected>Select Academic Year</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
                <option value="Other">Other / Master-PhD Year</option>
            </select>

            <label for="candEvent">Target Event</label>
            <select id="candEvent" name="eventName" required>
                <option value="" disabled selected>Select Event</option>
                {% for evt in events %}
                {% if evt.registration_open %}
                <option value="{{ evt.title }}">{{ evt.title }}</option>
                {% endif %}
                {% endfor %}
                <option value="Other / General Workshop">Other / General Workshop</option>
            </select>

            <label for="candSkills">Skills &amp; Motivation (Brief)</label>
            <textarea id="candSkills" name="skills" placeholder="List any tech stacks you use, or explain why you are interested in this event..." required></textarea>

            <button type="submit">Submit Registration</button>
        </form>
        
        <script>
            // Persist registration form in localStorage so refreshes don't wipe it
            const fields = ['candName', 'candRoll', 'candEmail', 'candPhone', 'candBranch', 'candDegree', 'candYear', 'candEvent', 'candSkills'];
            
            // Load saved data immediately on execution (no need to wait for full page load)
            fields.forEach(id => {
                try {
                    const saved = localStorage.getItem('reg_' + id);
                    if (saved !== null) {
                        const el = document.getElementById(id);
                        if (el) el.value = saved;
                    }
                } catch(e) {}
            });

            // Check for query parameter prefill for target event
            const urlParams = new URLSearchParams(window.location.search);
            const eventParam = urlParams.get('event');
            if (eventParam) {
                const el = document.getElementById('candEvent');
                if (el) {
                    let optionExists = false;
                    for (let i = 0; i < el.options.length; i++) {
                        if (el.options[i].value === eventParam) {
                            optionExists = true;
                            break;
                        }
                    }
                    if (!optionExists) {
                        const newOpt = document.createElement('option');
                        newOpt.value = eventParam;
                        newOpt.text = eventParam;
                        el.add(newOpt);
                    }
                    el.value = eventParam;
                }
            }
            
            // Clean up query parameters from the browser address bar so refreshing doesn't overwrite input
            if (eventParam) {
                setTimeout(() => {
                    try {
                        window.history.replaceState(window.history.state, document.title, window.location.pathname);
                    } catch (e) {}
                }, 200);
            }

            // Save data on each input change
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', () => {
                        try {
                            localStorage.setItem('reg_' + id, el.value);
                        } catch(e) {}
                    });
                }
            });

            // Clear storage on form submit
            document.getElementById('registerForm').addEventListener('submit', () => {
                fields.forEach(id => {
                    try {
                        localStorage.removeItem('reg_' + id);
                    } catch(e) {}
                });
            });
        </script>
    </section>
{% endblock %}
