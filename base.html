<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="index, follow">
    <title>{% block title %}Coding & AI Club{% endblock %}</title>

    <link rel="icon" type="image/png" href="images/club-logo.png">
    <meta property="og:title" content="Coding & AI Club | NIT Mizoram">
    <meta property="og:description" content="A student-driven community building real-world technology, software engineering, and AI projects.">
    <meta property="og:image" content="images/club-logo.png">
    <meta property="og:url" content="https://coding-ai-club-nitmizoram.vercel.app">
    <meta name="theme-color" content="#0a1f44">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header top-header">
    <img src="images/nitmz-logo.png" alt="Institute Logo" class="logo">
    <div class="header-text">
        <h1>Coding &amp; AI Club</h1>
        <p class="tagline">Code . Create . Collaborate</p>
        <p class="hindi-text">राष्ट्रीय प्रौद्योगिकी संस्थान, मिज़ोरम</p>
    </div>
    <img src="images/club-logo.png" alt="Club Logo" class="logo">
</header>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="events.html">Events</a>
    <a href="teams.html">Core Team</a>
    <a href="credits.html">Web Team</a>
    <a href="projects.html">Projects</a>
    <a href="resources.html">Resources</a>
    <a href="contact.html">Connect</a>
    <a href="join.html">Join Us</a>
</nav>

<main style="flex:1; display:flex; flex-direction:column;">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <p>© 2026 Coding &amp; AI Club</p>
    <p class="hindi-footer">Coding &amp; AI Club · National Institute of Technology</p>
    <p class="sub-text"></p>
</footer>

</html>
